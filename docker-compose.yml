# Canal4 — Docker Compose
#
# Services:
#   spacetimedb  — SpacetimeDB server (clockworklabs/spacetime)
#   module-init  — One-shot container that publishes the SpacetimeDB module on first boot
#   webapp       — Express + Vite SPA (Canal4 web webapp)
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose up -d
#
# SpacetimeDB Cloud (spacetimedb.com):
#   If you are hosting your database on SpacetimeDB Cloud instead of locally:
#   1. Set `SPACETIMEDB_URI` in .env to `wss://maincloud.spacetimedb.com`
#   2. You can comment out or remove the `spacetimedb` service below.
#   3. Use the module-init below to publish the bundle safely. This also auto updates the database if you use watchtower.
#
# Note: The module must be re-published when schema/reducer changes are made.
#   Run:  docker compose run --rm module-init

services:

  # ─── SpacetimeDB ────────────────────────────────────────────────────────────
  spacetimedb:
    image: clockworklabs/spacetime:latest
    pull_policy: always
    command: start
    ports:
      - "${SPACETIMEDB_PORT:-3000}:3000"
    volumes:
      - spacetimedb_data:/var/lib/spacetimedb
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/v1/info" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ─── Module publisher (one-shot) ────────────────────────────────────────────
  # Publishes compiled logic into the running SpacetimeDB instance.
  # Runs once on `docker compose up` and exits. Re-run manually after schema changes.
  module-init:
    image: ghcr.io/leocb/canal4/module-init:latest
    pull_policy: always
    depends_on:
      spacetimedb:
        condition: service_healthy
    working_dir: /module
    env_file: .env # Portainer: use "stack.env" instead
    environment:
      SPACETIMEDB_NAME: ${SPACETIMEDB_NAME}
      SPACETIMEDB_SERVER: ${SPACETIMEDB_SERVER:-http://spacetimedb:3000}
      SPACETIMEDB_IDENTITY_TOKEN: ${SPACETIMEDB_IDENTITY_TOKEN}
    entrypoint:
      - sh
      - -c
      - |
        # 1. Login if a token is provided (prevents anonymous/unauthorized updates)
        if [ -n "$$SPACETIMEDB_IDENTITY_TOKEN" ]; then
          echo "Setting up publishing identity..."
          spacetime login --token "$$SPACETIMEDB_IDENTITY_TOKEN"
        fi

        # 2. Publish the module using the built JS bundle directly
        echo "Publishing $$SPACETIMEDB_NAME to $$SPACETIMEDB_SERVER..."
        spacetime publish \
          --no-config \
          --server "$$SPACETIMEDB_SERVER" \
          --js-path /module/bundle.js \
          --yes \
          "$$SPACETIMEDB_NAME"
        
        echo "Module published successfully."
    restart: "no"

  # ─── Web app ────────────────────────────────────────────────────────────────
  webapp:
    image: ghcr.io/leocb/canal4/webapp:latest
    pull_policy: always
    ports:
      - "${WEBAPP_PORT:-3001}:80"
    env_file: .env # Portainer: use "stack.env" instead
    environment:
      # Runtime SpacetimeDB config (passed to Nginx/SPA)
      SPACETIMEDB_NAME: ${SPACETIMEDB_NAME}
      SPACETIMEDB_URI: ${SPACETIMEDB_URI}
    depends_on:
      spacetimedb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  spacetimedb_data:
    driver: local
