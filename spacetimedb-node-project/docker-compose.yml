# Canal4 — Docker Compose
#
# Services:
#   spacetimedb  — SpacetimeDB server (clockworklabs/spacetime)
#   module-init  — One-shot container that publishes the SpacetimeDB module on first boot
#   webapp       — Express + Vite SPA (Canal4 web client)
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. Build the SpacetimeDB module:  cd spacetimedb && npm run build
#   3. docker compose up -d
#
# Note: The module must be re-published when schema/reducer changes are made.
#   Run:  docker compose run --rm module-init

services:

  # ─── SpacetimeDB ────────────────────────────────────────────────────────────
  spacetimedb:
    image: clockworklabs/spacetime:latest
    pull_policy: always
    command: start
    ports:
      - "${SPACETIMEDB_PORT:-3000}:3000"
    volumes:
      - spacetimedb_data:/var/lib/spacetimedb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ─── Module publisher (one-shot) ────────────────────────────────────────────
  # Publishes dist/bundle.js into the running SpacetimeDB instance.
  # Runs once on `docker compose up` and exits. Re-run manually after schema changes.
  module-init:
    image: clockworklabs/spacetime:latest
    pull_policy: always
    depends_on:
      spacetimedb:
        condition: service_healthy
    volumes:
      - ./spacetimedb/dist:/module:ro
    entrypoint: >
      sh -c "
        spacetime publish
          --server http://spacetimedb:3000
          --skip-clippy
          --bundle /module/bundle.js
          ${SPACETIMEDB_NAME}
        echo 'Module published successfully.'
      "
    environment:
      SPACETIMEDB_NAME: ${SPACETIMEDB_NAME}
    restart: "no"

  # ─── Web app ────────────────────────────────────────────────────────────────
  webapp:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "${WEBAPP_PORT:-3001}:3001"
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
      # Runtime SpacetimeDB config (injected via /env-config.js, no rebuild needed)
      SPACETIMEDB_NAME: ${SPACETIMEDB_NAME}
      SPACETIMEDB_URI: ${SPACETIMEDB_URI}
      # SMTP
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      # Backend auth token
      SPACETIMEDB_SERVER_PRIVATE_KEY: ${SPACETIMEDB_SERVER_PRIVATE_KEY}
    depends_on:
      spacetimedb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  spacetimedb_data:
    driver: local
