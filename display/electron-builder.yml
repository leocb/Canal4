appId: org.canal4.display
productName: Canal4
copyright: Copyright © 2026 - github.com/leocb
directories:
  buildResources: build
  output: dist

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'

asarUnpack:
  - resources/**

# ─── macOS ────────────────────────────────────────────────────────────────────
mac:
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  icon: build/icon.icns
  category: public.app-category.utilities
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

dmg:
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  title: ${productName} ${version}
  background: null
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

zip:
  artifactName: ${productName}-${version}-mac-${arch}.${ext}

# ─── Windows ──────────────────────────────────────────────────────────────────
win:
  icon: build/icon.ico
  executableName: Canal4
  target:
    - target: nsis
      arch: [x64]

nsis:
  artifactName: ${productName}-${version}-windows-${arch}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  createStartMenuShortcut: true
  oneClick: false          # Show installer wizard (allows choosing install dir)
  allowToChangeInstallationDirectory: true
  perMachine: false        # Per-user install by default (no admin required)

# ─── Linux (kept for reference) ───────────────────────────────────────────────
linux:
  icon: build/icon.png
  target:
    - AppImage
    - deb
  maintainer: github.com/leocb
  category: Utility

appImage:
  artifactName: ${productName}-${version}-${arch}.${ext}

npmRebuild: false

publish:
  provider: github
  owner: leocb
  repo: Canal4
