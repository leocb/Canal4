name: Trigger New Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'What kind of version bump?'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # We need a token that can bypass branch protection if main is protected.
          # Otherwise GITHUB_TOKEN works fine for simple repos.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Git Configuration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version in Apps
        id: bump
        run: |
          # 1. Update Display app
          cd display
          npm version ${{ github.event.inputs.version_type }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          
          # 2. Update Webapp
          cd ../webapp
          npm version $NEW_VERSION --no-git-tag-version
          
          # 3. Update SpacetimeDB module
          cd ../spacetimedb
          npm version $NEW_VERSION --no-git-tag-version
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and Push
        run: |
          VERSION=$(node -p "require('./display/package.json').version")
          git add display/package.json display/package-lock.json \
                  webapp/package.json webapp/package-lock.json \
                  spacetimedb/package.json spacetimedb/package-lock.json
          git commit -m "chore: release version $VERSION"
          git tag v$VERSION
          git push origin main --tags
