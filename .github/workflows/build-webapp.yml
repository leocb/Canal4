name: Build & Push Webapp Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'leocb' # Only run on main repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./webapp
          file: ./webapp/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/webapp:latest
            ${{ startsWith(github.ref, 'refs/tags/v') && format('ghcr.io/{0}/webapp:{1}', github.repository, github.ref_name) || '' }}
