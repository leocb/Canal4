name: Build & Push Docker Images

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'leocb' # Only run on main repo
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lower case repository name
        run: |
          REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          echo "WEBAPP_TAG=ghcr.io/${REPO_LOWER}/webapp" >> $GITHUB_ENV
          echo "MODULE_TAG=ghcr.io/${REPO_LOWER}/module-init" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./webapp/Dockerfile
          push: true
          tags: |
            ${{ env.WEBAPP_TAG }}:latest
            ${{ startsWith(github.ref, 'refs/tags/v') && format('{0}:{1}', env.WEBAPP_TAG, github.ref_name) || '' }}

  build-module-init:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'leocb' # Only run on main repo
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lower case repository name
        run: |
          REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          echo "MODULE_TAG=ghcr.io/${REPO_LOWER}/module-init" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Module Init image
        uses: docker/build-push-action@v5
        with:
          context: ./spacetimedb
          file: ./spacetimedb/Dockerfile
          push: true
          tags: |
            ${{ env.MODULE_TAG }}:latest
            ${{ startsWith(github.ref, 'refs/tags/v') && format('{0}:{1}', env.MODULE_TAG, github.ref_name) || '' }}
