name: Build & Release Desktop Apps

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: github.repository_owner == 'leocb'
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: display/package-lock.json

      - name: Install Dependencies
        working-directory: display
        run: npm ci

      - name: Build Application
        working-directory: display
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            npm run build:mac
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            npm run build:win
          fi
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: canal4-display-node-${{ matrix.os }}
          path: |
            display/dist/*.dmg
            display/dist/*.exe
            display/dist/*.zip
            display/dist/*.yml
          if-no-files-found: error

  publish-latest:
    name: Update Latest Development Build
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Development Build (Latest)"
          body: |
            This release contains the latest automated builds from the `main` branch.
            **Warning:** These builds are for testing purposes and may be unstable.
            
            Last updated: ${{ github.event.head_commit.timestamp }}
          files: |
            release-artifacts/*.dmg
            release-artifacts/*.exe
            release-artifacts/*.zip
            release-artifacts/*.yml
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-versioned:
    name: Official Versioned Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create Versioned Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.dmg
            release-artifacts/*.exe
            release-artifacts/*.zip
            release-artifacts/*.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
