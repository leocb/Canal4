name: Build & Release Desktop Apps

on:
  push:
    tags: [ "v*" ]
  workflow_run:
    workflows: ["Trigger New Release"]
    types: [ "completed" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: |
      github.repository_owner == 'leocb' && 
      (github.event_name == 'workflow_run' ? github.event.workflow_run.conclusion == 'success' : true)

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: display/package-lock.json

      - name: Install Dependencies
        working-directory: display
        run: npm ci

      - name: Build Application
        working-directory: display
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            npm run build:mac
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            npm run build:win
          fi
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: canal4-display-node-${{ matrix.os }}
          path: |
            display/dist/*.dmg
            display/dist/*.exe
            display/dist/*.zip
            display/dist/*.yml
            !display/dist/builder-debug.yml
          if-no-files-found: error

  release-versioned:
    name: Official Versioned Release
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || 
      startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version from Package
        id: pkg_version
        run: |
          VERSION=v$(node -p "require('./display/package.json').version")
          echo "tag_name=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create Versioned Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg_version.outputs.tag_name }}
          files: |
            release-artifacts/*.dmg
            release-artifacts/*.exe
            release-artifacts/*.zip
            release-artifacts/*.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
